name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare preview files
        run: |
          mkdir -p preview/pr-${{ github.event.pull_request.number }}
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.DS_Store' \
            ./ preview/pr-${{ github.event.pull_request.number }}/

      - name: Deploy preview to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./preview
          keep_files: true
          enable_jekyll: false
